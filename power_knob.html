<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Knob — BuhloWar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0e14;
    color: #c0c8d4;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.knob-container {
    position: relative;
    width: 220px;
    height: 220px;
}

/* SVG шкала и ручка */
.knob-svg {
    width: 100%;
    height: 100%;
}

/* Стиль дуги фона */
.arc-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 6;
    stroke-linecap: round;
}

/* Активная дуга — заполненная часть */
.arc-active {
    fill: none;
    stroke: url(#arcGradient);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Основные деления (каждые 1 кВт) */
.tick-major {
    stroke: rgba(255,255,255,0.5);
    stroke-width: 2;
    stroke-linecap: round;
}

/* Мелкие деления (каждые 100 Вт) */
.tick-minor {
    stroke: rgba(255,255,255,0.15);
    stroke-width: 1;
    stroke-linecap: round;
}

/* Подписи основных делений */
.tick-label {
    fill: rgba(255,255,255,0.45);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    text-anchor: middle;
    dominant-baseline: middle;
}

/* Круг ручки */
.knob-body {
    fill: #141a24;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 2;
    filter: drop-shadow(0 0 8px rgba(0,240,255,0.08));
}

/* Внутренний круг ручки */
.knob-inner {
    fill: #0d1117;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 1;
}

/* Маркер положения ручки */
.knob-marker {
    fill: #00f0ff;
    filter: drop-shadow(0 0 4px rgba(0,240,255,0.8));
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: 110px 110px;
}

/* Свечение вокруг маркера */
.knob-glow {
    fill: rgba(0,240,255,0.15);
    filter: blur(3px);
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: 110px 110px;
}

/* Цифровое значение */
.knob-value {
    fill: #00f0ff;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: middle;
    filter: drop-shadow(0 0 6px rgba(0,240,255,0.5));
}

/* Подпись единицы */
.knob-unit {
    fill: rgba(0,240,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    font-weight: 400;
    text-anchor: middle;
    dominant-baseline: middle;
    letter-spacing: 0.15em;
}

/* Метка МОЩНОСТЬ */
.knob-title {
    fill: rgba(255,255,255,0.35);
    font-family: 'Courier New', monospace;
    font-size: 8px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: middle;
    letter-spacing: 0.25em;
}

/* Панель обрамления */
.panel-frame {
    background: rgba(13,17,23,0.85);
    border: 1px solid rgba(0,240,255,0.12);
    border-radius: 8px;
    backdrop-filter: blur(8px);
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
}

.panel-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: rgba(255,140,0,0.6);
    text-transform: uppercase;
}

/* Кнопки тестирования */
.test-controls {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
}

.test-btn {
    background: rgba(0,240,255,0.06);
    border: 1px solid rgba(0,240,255,0.2);
    border-radius: 4px;
    color: rgba(0,240,255,0.7);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
}

.test-btn:hover {
    background: rgba(0,240,255,0.12);
    border-color: rgba(0,240,255,0.4);
    color: #00f0ff;
}

.test-btn.active {
    background: rgba(0,240,255,0.15);
    border-color: rgba(0,240,255,0.5);
    color: #00f0ff;
}
</style>
</head>
<body>

<div class="panel-frame">
    <div class="panel-title">МОЩНОСТЬ</div>

    <div class="knob-container">
        <svg class="knob-svg" viewBox="0 0 220 220" id="knobSvg">
            <defs>
                <!-- Градиент для активной дуги -->
                <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:rgba(0,240,255,0.3)"/>
                    <stop offset="100%" style="stop-color:#00f0ff"/>
                </linearGradient>
            </defs>

            <!-- Дуга фона (270°: от 135° до 405°) -->
            <circle cx="110" cy="110" r="95" class="arc-bg"
                stroke-dasharray="449.47" stroke-dashoffset="-112.37"
                transform="rotate(135, 110, 110)"/>

            <!-- Активная дуга -->
            <circle cx="110" cy="110" r="95" class="arc-active" id="arcActive"
                stroke-dasharray="449.47" stroke-dashoffset="449.47"
                transform="rotate(135, 110, 110)"/>

            <!-- Деления и подписи генерируются JS -->

            <!-- Свечение маркера -->
            <circle cx="110" cy="30" r="6" class="knob-glow" id="knobGlow"/>

            <!-- Маркер на ручке -->
            <circle cx="110" cy="30" r="4" class="knob-marker" id="knobMarker"/>

            <!-- Тело ручки -->
            <circle cx="110" cy="110" r="52" class="knob-body"/>
            <circle cx="110" cy="110" r="44" class="knob-inner"/>

            <!-- Значение в центре -->
            <text x="110" y="105" class="knob-value" id="knobValueText">3000</text>
            <text x="110" y="122" class="knob-unit">WATT</text>

            <!-- Подпись внизу -->
            <text x="110" y="175" class="knob-title">МОЩНОСТЬ</text>
        </svg>
    </div>

    <div class="test-controls">
        <button class="test-btn" onclick="setPower(0)">0</button>
        <button class="test-btn" onclick="setPower(500)">500</button>
        <button class="test-btn" onclick="setPower(1000)">1kW</button>
        <button class="test-btn" onclick="setPower(2000)">2kW</button>
        <button class="test-btn" onclick="setPower(3000)">3kW</button>
        <button class="test-btn" onclick="setPower(4000)">4kW</button>
        <button class="test-btn" onclick="setPower(5000)">5kW</button>
        <button class="test-btn" onclick="setPower(6000)">6kW</button>
        <button class="test-btn" onclick="setPower(7000)">7kW</button>
    </div>
</div>

<script>
    // === Настройки ===
    const MIN_POWER = 100;       // минимальная мощность (W)
    const MAX_POWER = 7000;      // максимальная мощность (W)
    const STEP_MAJOR = 1000;     // крупные деления (каждые 1 кВт)
    const STEP_MINOR = 100;      // мелкие деления (каждые 100 Вт)
    const START_ANGLE = 135;     // начальный угол дуги (градусы, нижний левый)
    const SWEEP_ANGLE = 270;     // полный sweep дуги (градусы)
    const TICK_OUTER_R = 95;     // радиус внешних делений
    const TICK_MAJOR_LEN = 10;   // длина крупного деления
    const TICK_MINOR_LEN = 5;    // длина мелкого деления
    const LABEL_R = 76;          // радиус подписей

    const CX = 110, CY = 110;   // центр SVG

    let currentPower = 3000;

    // === Генерация делений и подписей ===
    function createTicks() {
        const svg = document.getElementById('knobSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const totalSteps = (MAX_POWER - MIN_POWER) / STEP_MINOR;

        for (let i = 0; i <= totalSteps; i++) {
            const power = MIN_POWER + i * STEP_MINOR;
            const frac = i / totalSteps;
            const angle = START_ANGLE + frac * SWEEP_ANGLE;
            const rad = angle * Math.PI / 180;

            const isMajor = (power % STEP_MAJOR === 0);
            const tickLen = isMajor ? TICK_MAJOR_LEN : TICK_MINOR_LEN;

            const x1 = CX + (TICK_OUTER_R - tickLen) * Math.cos(rad);
            const y1 = CY + (TICK_OUTER_R - tickLen) * Math.sin(rad);
            const x2 = CX + TICK_OUTER_R * Math.cos(rad);
            const y2 = CY + TICK_OUTER_R * Math.sin(rad);

            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('class', isMajor ? 'tick-major' : 'tick-minor');
            // Вставляем перед телом ручки
            svg.insertBefore(line, document.querySelector('.knob-glow'));

            // Подписи для крупных делений
            if (isMajor) {
                const lx = CX + LABEL_R * Math.cos(rad);
                const ly = CY + LABEL_R * Math.sin(rad);
                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', lx);
                text.setAttribute('y', ly);
                text.setAttribute('class', 'tick-label');
                const label = power >= 1000 ? (power / 1000) + 'k' : power.toString();
                text.textContent = label;
                svg.insertBefore(text, document.querySelector('.knob-glow'));
            }
        }
    }

    // === Обновление положения ручки и дуги ===
    function updateKnob(power) {
        const clamped = Math.max(MIN_POWER, Math.min(MAX_POWER, power));
        const frac = (clamped - MIN_POWER) / (MAX_POWER - MIN_POWER);
        const angle = START_ANGLE + frac * SWEEP_ANGLE; // текущий угол маркера

        // Активная дуга: полная длина = 2 * PI * 95 ≈ 596.9, но для 270° = 449.47
        // stroke-dashoffset = fullLen * (1 - frac)
        const fullArcLen = 2 * Math.PI * TICK_OUTER_R * (SWEEP_ANGLE / 360);
        const offset = fullArcLen * (1 - frac);

        const arcEl = document.getElementById('arcActive');
        arcEl.style.strokeDashoffset = offset;

        // Поворот маркера: угол от начального положения (верх)
        // Маркер на SVG стоит на 0° (верх, cy=30). Поворачиваем на angle
        const markerAngle = angle - 90; // -90 т.к. 0° маркера = верх (12 часов)
        const marker = document.getElementById('knobMarker');
        const glow = document.getElementById('knobGlow');
        marker.style.transform = 'rotate(' + markerAngle + 'deg)';
        glow.style.transform = 'rotate(' + markerAngle + 'deg)';

        // Текст значения
        document.getElementById('knobValueText').textContent = clamped;

        // Цвет значения: зелёный при норме, оранжевый при высоком
        const valEl = document.getElementById('knobValueText');
        if (clamped >= 6000) {
            valEl.style.fill = '#ff6600';
            valEl.style.filter = 'drop-shadow(0 0 6px rgba(255,102,0,0.5))';
        } else {
            valEl.style.fill = '#00f0ff';
            valEl.style.filter = 'drop-shadow(0 0 6px rgba(0,240,255,0.5))';
        }
    }

    // === Публичная функция установки мощности ===
    function setPower(power) {
        currentPower = power;
        updateKnob(currentPower);

        // Подсветка активной кнопки
        document.querySelectorAll('.test-btn').forEach(b => b.classList.remove('active'));
    }

    // === Инициализация ===
    createTicks();
    setPower(3000);
</script>

</body>
</html>
