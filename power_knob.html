<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Knob — BuhloWar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0e14;
    color: #c0c8d4;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.knob-container {
    position: relative;
    width: 220px;
    height: 220px;
}

.knob-svg {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<div class="knob-container">
    <svg class="knob-svg" viewBox="0 0 220 220" id="knobSvg">
        <defs>
            <!-- Металлический градиент для ручки -->
            <radialGradient id="knobMetal" cx="45%" cy="40%" r="55%">
                <stop offset="0%" style="stop-color:#3a3f4a"/>
                <stop offset="40%" style="stop-color:#2a2f38"/>
                <stop offset="80%" style="stop-color:#1a1e26"/>
                <stop offset="100%" style="stop-color:#14181f"/>
            </radialGradient>
            <!-- Блик на ручке -->
            <radialGradient id="knobHighlight" cx="38%" cy="35%" r="40%">
                <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
                <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
            </radialGradient>
            <!-- Скос края для 3D -->
            <radialGradient id="knobEdge" cx="50%" cy="50%" r="50%">
                <stop offset="85%" style="stop-color:rgba(255,255,255,0)"/>
                <stop offset="95%" style="stop-color:rgba(255,255,255,0.04)"/>
                <stop offset="100%" style="stop-color:rgba(0,0,0,0.3)"/>
            </radialGradient>
            <!-- Свечение под ручкой -->
            <radialGradient id="baseGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" style="stop-color:rgba(0,240,255,0.06)"/>
                <stop offset="100%" style="stop-color:rgba(0,240,255,0)"/>
            </radialGradient>
        </defs>

        <!-- Подложка с свечением -->
        <circle cx="110" cy="110" r="108" fill="url(#baseGlow)"/>

        <!-- Деления и подписи -->
        <g id="tickGroup"></g>

        <!-- Шайба ручки — тень -->
        <circle cx="110" cy="112" r="50" fill="rgba(0,0,0,0.4)" filter="url(#shadowBlur)"/>
        <defs>
            <filter id="shadowBlur"><feGaussianBlur in="SourceGraphic" stdDeviation="3"/></filter>
        </defs>

        <!-- Шайба ручки — тело -->
        <circle cx="110" cy="110" r="50" fill="url(#knobMetal)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

        <!-- Насечки (knurling) -->
        <g id="knurlGroup" opacity="0.3"></g>

        <!-- Блик -->
        <circle cx="110" cy="110" r="50" fill="url(#knobHighlight)"/>
        <!-- Скос -->
        <circle cx="110" cy="110" r="50" fill="url(#knobEdge)"/>

        <!-- Втулка -->
        <circle cx="110" cy="110" r="11" fill="#1a1e26" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <circle cx="110" cy="110" r="7" fill="#0d1015" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

        <!-- Белая линия-указатель -->
        <g id="indicatorGroup">
            <line x1="110" y1="62" x2="110" y2="78" stroke="rgba(0,240,255,0.4)" stroke-width="3.5" stroke-linecap="round"/>
            <line x1="110" y1="62" x2="110" y2="78" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
        </g>
    </svg>
</div>

<script>
    // === Настройки ===
    const MIN_POWER = 100;
    const MAX_POWER = 7000;
    const STEP_MAJOR = 1000;     // крупные деления (1 кВт)
    const STEP_MINOR = 100;      // мелкие деления (100 Вт)
    const START_ANGLE = 135;     // начальный угол дуги (нижний левый)
    const SWEEP_ANGLE = 270;     // sweep дуги (градусы)
    const TICK_OUTER_R = 68;     // радиус внешнего края делений (рядом с ручкой)
    const TICK_MAJOR_LEN = 10;   // длина крупного деления
    const TICK_MINOR_LEN = 5;    // длина мелкого деления
    const LABEL_R = 82;          // радиус подписей (снаружи от делений)

    const CX = 110, CY = 110;
    let currentPower = 3000;

    // === Насечки на ручке (knurling) ===
    function createKnurling() {
        const g = document.getElementById('knurlGroup');
        const ns = 'http://www.w3.org/2000/svg';
        const count = 60;
        const innerR = 44, outerR = 49;

        for (let i = 0; i < count; i++) {
            const angle = (i / count) * 360;
            const rad = angle * Math.PI / 180;
            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', CX + innerR * Math.cos(rad));
            line.setAttribute('y1', CY + innerR * Math.sin(rad));
            line.setAttribute('x2', CX + outerR * Math.cos(rad));
            line.setAttribute('y2', CY + outerR * Math.sin(rad));
            line.setAttribute('stroke', 'rgba(255,255,255,0.5)');
            line.setAttribute('stroke-width', '0.5');
            g.appendChild(line);
        }
    }

    // === Деления и подписи ===
    function createTicks() {
        const g = document.getElementById('tickGroup');
        const ns = 'http://www.w3.org/2000/svg';
        const totalSteps = (MAX_POWER - MIN_POWER) / STEP_MINOR;

        for (let i = 0; i <= totalSteps; i++) {
            const power = MIN_POWER + i * STEP_MINOR;
            const frac = i / totalSteps;
            const angle = START_ANGLE + frac * SWEEP_ANGLE;
            const rad = angle * Math.PI / 180;

            const isMajor = (power % STEP_MAJOR === 0);
            const tickLen = isMajor ? TICK_MAJOR_LEN : TICK_MINOR_LEN;

            // Деления: от внешнего края внутрь (к ручке)
            const x1 = CX + TICK_OUTER_R * Math.cos(rad);
            const y1 = CY + TICK_OUTER_R * Math.sin(rad);
            const x2 = CX + (TICK_OUTER_R - tickLen) * Math.cos(rad);
            const y2 = CY + (TICK_OUTER_R - tickLen) * Math.sin(rad);

            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', isMajor ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.15)');
            line.setAttribute('stroke-width', isMajor ? '1.5' : '0.7');
            line.setAttribute('stroke-linecap', 'round');
            g.appendChild(line);

            // Подписи для крупных делений — снаружи
            if (isMajor) {
                const lx = CX + LABEL_R * Math.cos(rad);
                const ly = CY + LABEL_R * Math.sin(rad);

                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', lx);
                text.setAttribute('y', ly);
                text.setAttribute('fill', 'rgba(255,255,255,0.5)');
                text.setAttribute('font-family', "'Courier New', monospace");
                text.setAttribute('font-size', '9');
                text.setAttribute('font-weight', '600');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');

                // Поворот текста: чтобы читался естественно снаружи
                const textAngle = angle;
                if (textAngle > 180 && textAngle < 360) {
                    text.setAttribute('transform', 'rotate(' + (textAngle - 180) + ', ' + lx + ', ' + ly + ')');
                } else {
                    text.setAttribute('transform', 'rotate(' + textAngle + ', ' + lx + ', ' + ly + ')');
                }

                text.textContent = power >= 1000 ? (power / 1000) + 'k' : power.toString();
                g.appendChild(text);
            }
        }
    }

    // === Обновление ручки ===
    function updateKnob(power) {
        const clamped = Math.max(MIN_POWER, Math.min(MAX_POWER, power));
        const frac = (clamped - MIN_POWER) / (MAX_POWER - MIN_POWER);
        const angle = START_ANGLE + frac * SWEEP_ANGLE;

        // Поворот указателя: линия нарисована на 12 часов (0°), а шкала начинается от 135°
        // поэтому нужен сдвиг +90° чтобы указатель совпал с делением
        const indicator = document.getElementById('indicatorGroup');
        indicator.setAttribute('transform', 'rotate(' + (angle + 90) + ', ' + CX + ', ' + CY + ')');
    }

    // === Публичная функция ===
    function setPower(power) {
        currentPower = power;
        updateKnob(currentPower);
    }

    // === Инициализация ===
    createKnurling();
    createTicks();
    setPower(3000);
</script>

</body>
</html>
