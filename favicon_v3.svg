<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/>
      <stop offset="30%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#606060"/>
    </linearGradient>
    <linearGradient id="steelDk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="copper2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a040"/>
      <stop offset="100%" stop-color="#a06020"/>
    </linearGradient>
    <linearGradient id="fl2" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="50%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#aaeeff"/>
    </linearGradient>
    <linearGradient id="liq2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg2)"/>

  <!-- Modern column still -->
  <!-- Base plate -->
  <rect x="16" y="54" width="32" height="4" rx="1" fill="url(#steel)" stroke="#555" stroke-width="0.5"/>

  <!-- Boiler (copper cube) -->
  <rect x="18" y="40" width="28" height="14" rx="3" fill="url(#copper2)" stroke="#704010" stroke-width="0.8"/>
  <rect x="20" y="42" width="24" height="8" rx="2" fill="url(#liq2)"/>

  <!-- Column (tall steel tube) -->
  <rect x="26" y="12" width="12" height="30" rx="2" fill="url(#steel)" stroke="#555" stroke-width="0.6"/>

  <!-- Copper bands on column -->
  <rect x="24" y="18" width="16" height="2" rx="0.5" fill="url(#copper2)" opacity="0.7"/>
  <rect x="24" y="26" width="16" height="2" rx="0.5" fill="url(#copper2)" opacity="0.7"/>
  <rect x="24" y="34" width="16" height="2" rx="0.5" fill="url(#copper2)" opacity="0.7"/>

  <!-- Thermometer on column -->
  <rect x="40" y="18" width="2" height="12" rx="1" fill="#eee" stroke="#999" stroke-width="0.3"/>
  <circle cx="41" cy="31" r="2.5" fill="#ff3333" filter="url(#glow2)"/>
  <rect x="40.3" y="20" width="1.4" height="11" fill="#ff3333"/>

  <!-- Reflux condenser at top -->
  <rect x="22" y="8" width="20" height="5" rx="2" fill="url(#steelDk)" stroke="#555" stroke-width="0.5"/>

  <!-- Output pipe going right -->
  <path d="M34,13 L34,8 L52,8" stroke="url(#steel)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Product drip -->
  <ellipse cx="54" cy="11" rx="1.2" ry="1.8" fill="#ffd700" opacity="0.7"/>

  <!-- LED indicators -->
  <circle cx="20" cy="46" r="1.2" fill="#00ff88" opacity="0.9"/>
  <circle cx="24" cy="46" r="1.2" fill="#ff4444" opacity="0.3"/>
  <circle cx="28" cy="46" r="1.2" fill="#4488ff" opacity="0.5"/>

  <!-- Flame underneath -->
  <path d="M24,56 Q26,52 28,49 Q30,52 32,49 Q34,52 36,49 Q38,52 40,56 Z" fill="url(#fl2)" opacity="0.7"/>
  <path d="M28,56 Q30,52 32,50 Q33,52 32,55 Z" fill="#aaeeff" opacity="0.3"/>

  <!-- Shine on column -->
  <rect x="28" y="14" width="2" height="26" rx="1" fill="white" opacity="0.06"/>

  <!-- Digital display -->
  <rect x="36" y="43" width="8" height="5" rx="1" fill="#001a00" stroke="#336633" stroke-width="0.3"/>
  <text x="40" y="47.5" text-anchor="middle" font-size="4" font-family="monospace" fill="#00ff44" opacity="0.8">78.2</text>

  <!-- Steam wisps -->
  <path d="M26,7 Q25,4 26,1" stroke="white" stroke-width="0.6" fill="none" opacity="0.2"/>
  <path d="M32,7 Q33,3 32,0" stroke="white" stroke-width="0.5" fill="none" opacity="0.15"/>
</svg>
