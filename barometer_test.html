<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барометр - Тест v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        
        .baro-container {
            background: rgba(10,15,26,0.95);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 200px;
        }
        .baro-title {
            font-size: 10px;
            color: #00f0ff;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0,240,255,0.3);
        }
        .baro-canvas-wrap {
            width: 180px;
            height: 140px;
            position: relative;
        }
        .baro-canvas-wrap canvas {
            width: 100%;
            height: 100%;
        }
        .baro-value {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .baro-val-num {
            font-size: 28px;
            font-weight: 700;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0,240,255,0.4);
            font-variant-numeric: tabular-nums;
        }
        .baro-val-unit {
            font-size: 9px;
            color: #3a4a60;
            letter-spacing: 0.12em;
        }
        .baro-corr {
            font-size: 13px;
            color: #ff8c00;
            font-weight: 600;
            text-shadow: 0 0 6px rgba(255,140,0,0.3);
        }
        
        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(10,15,26,0.95);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 8px;
            padding: 16px;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-row label {
            font-size: 11px;
            color: #6a7588;
            width: 100px;
        }
        .control-row input[type="range"] {
            flex: 1;
            accent-color: #00f0ff;
        }
        .control-row span {
            font-size: 12px;
            color: #00f0ff;
            width: 50px;
            text-align: right;
        }
        button {
            background: linear-gradient(135deg, #005f6b, #003d47);
            border: 1px solid rgba(0,240,255,0.3);
            color: #00f0ff;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }
        button:hover {
            background: linear-gradient(135deg, #007a8a, #005f6b);
            box-shadow: 0 0 12px rgba(0,240,255,0.3);
        }
    </style>
</head>
<body>

    <div class="baro-container">
        <div class="baro-title">Атмосфера</div>
        <div class="baro-canvas-wrap">
            <canvas id="baroCanvas" width="180" height="140"></canvas>
            <div class="baro-value">
                <div class="baro-val-num" id="pressVal">760</div>
                <div class="baro-val-unit">мм.рт.ст</div>
            </div>
        </div>
        <div class="baro-corr" id="pressCorr">+0.00°</div>
    </div>

    <div class="controls">
        <div class="control-row">
            <label>Давление:</label>
            <input type="range" id="pressureSlider" min="720" max="790" value="760">
            <span id="pressureSpan">760</span>
        </div>
        <div class="control-row">
            <label>Эталон (adPressM):</label>
            <input type="range" id="refSlider" min="720" max="790" value="760">
            <span id="refSpan">760</span>
        </div>
        <div class="control-row">
            <label>Коэфф. °C/гПа:</label>
            <input type="range" id="coeffSlider" min="20" max="40" value="28">
            <span id="coeffSpan">0.028</span>
        </div>
        <button onclick="animatePressure()">Анимация</button>
    </div>

    <script>
        const canvas = document.getElementById('baroCanvas');
        const ctx = canvas.getContext('2d');
        
        // Pressure range
        const PRESS_MIN = 720;
        const PRESS_MAX = 790;
        const PRESS_NORM = 760;
        
        // Current values
        let currentPressure = 760;
        let targetPressure = 760;
        let adPressM = 760;
        let pressureCoeff = 0.028;
        
        // Animation
        let animating = false;
        
        function drawBarometer(pressure) {
            const w = canvas.width;
            const h = canvas.height;
            
            // Arc center at bottom-center, arc goes upward (semicircle on top)
            const cx = w / 2;
            const cy = h - 25; // center near bottom
            const radius = Math.min(w/2, h) - 15;
            
            ctx.clearRect(0, 0, w, h);
            
            // Arc spans from -135° to -45° (90° arc at top)
            // Or use full 180° semicircle: from 180° (left) to 0° (right)
            const arcStart = Math.PI;      // 180° - left
            const arcEnd = 0;              // 0° - right
            const arcSpan = Math.PI;       // 180° total
            
            // === OUTER SCALE RING (background) ===
            ctx.beginPath();
            ctx.arc(cx, cy, radius, arcStart, arcEnd);
            ctx.strokeStyle = 'rgba(0,240,255,0.06)';
            ctx.lineWidth = 20;
            ctx.stroke();
            
            // === PRESSURE ZONES (colored arc segments) ===
            const segments = [
                { from: 720, to: 740, color: '#ef4444' },  // low - red
                { from: 740, to: 750, color: '#f59e0b' },  // low-normal - amber
                { from: 750, to: 770, color: '#10b981' },  // normal - green
                { from: 770, to: 780, color: '#22d3ee' },  // high-normal - cyan
                { from: 780, to: 790, color: '#00f0ff' }   // high - bright cyan
            ];
            
            const innerR = radius - 10;
            const outerR = radius + 10;
            
            segments.forEach(seg => {
                const normStart = (seg.from - PRESS_MIN) / (PRESS_MAX - PRESS_MIN);
                const normEnd = (seg.to - PRESS_MIN) / (PRESS_MAX - PRESS_MIN);
                const angleStart = arcStart - (normStart * arcSpan);
                const angleEnd = arcStart - (normEnd * arcSpan);
                
                ctx.beginPath();
                ctx.arc(cx, cy, radius, angleStart, angleEnd, true);
                ctx.strokeStyle = seg.color;
                ctx.lineWidth = 12;
                ctx.lineCap = 'butt';
                ctx.stroke();
            });
            
            // === SCALE TICKS AND LABELS ===
            // Major ticks every 10 mmHg, minor every 5 mmHg
            for (let p = PRESS_MIN; p <= PRESS_MAX; p += 5) {
                const norm = (p - PRESS_MIN) / (PRESS_MAX - PRESS_MIN);
                const angle = arcStart - (norm * arcSpan);
                const isMajor = (p % 10 === 0);
                
                const tickInner = radius - 18;
                const tickOuter = radius - 8;
                
                ctx.beginPath();
                ctx.moveTo(
                    cx + tickInner * Math.cos(angle),
                    cy + tickInner * Math.sin(angle)
                );
                ctx.lineTo(
                    cx + tickOuter * Math.cos(angle),
                    cy + tickOuter * Math.sin(angle)
                );
                ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = isMajor ? 2 : 1;
                ctx.stroke();
                
                // Labels for major ticks
                if (isMajor) {
                    const labelR = radius - 28;
                    const lx = cx + labelR * Math.cos(angle);
                    const ly = cy + labelR * Math.sin(angle);
                    ctx.fillStyle = '#8a95a8';
                    ctx.font = 'bold 9px Consolas, monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.toString(), lx, ly);
                }
            }
            
            // === 760 NORMAL MARKER ===
            const normNorm = (PRESS_NORM - PRESS_MIN) / (PRESS_MAX - PRESS_MIN);
            const normAngle = arcStart - (normNorm * arcSpan);
            
            // Triangle marker at outer edge
            ctx.beginPath();
            const markerR = radius + 14;
            const mx = cx + markerR * Math.cos(normAngle);
            const my = cy + markerR * Math.sin(normAngle);
            ctx.moveTo(mx - 4, my - 6);
            ctx.lineTo(mx + 4, my - 6);
            ctx.lineTo(mx, my + 2);
            ctx.closePath();
            ctx.fillStyle = '#10b981';
            ctx.fill();
            
            // === NEEDLE ===
            const pressNorm = (pressure - PRESS_MIN) / (PRESS_MAX - PRESS_MIN);
            const needleAngle = arcStart - (pressNorm * arcSpan);
            const needleLen = radius - 5;
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(needleAngle);
            
            // Needle shadow/glow
            ctx.shadowColor = '#00f0ff';
            ctx.shadowBlur = 10;
            
            // Needle shape (tapered pointer)
            ctx.beginPath();
            ctx.moveTo(needleLen - 5, -2);
            ctx.lineTo(needleLen, 0);
            ctx.lineTo(needleLen - 5, 2);
            ctx.lineTo(-8, 3);
            ctx.lineTo(-8, -3);
            ctx.closePath();
            ctx.fillStyle = '#00f0ff';
            ctx.fill();
            
            // Center cap
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0f1a';
            ctx.fill();
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.restore();
            
            // === OUTER ARC BORDER ===
            ctx.beginPath();
            ctx.arc(cx, cy, radius, arcStart, arcEnd);
            ctx.strokeStyle = 'rgba(0,240,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
        
        function updateDisplay() {
            drawBarometer(currentPressure);
            document.getElementById('pressVal').textContent = Math.round(currentPressure);
            
            const pressDiffMmHg = currentPressure - adPressM;
            const pressCorr = (pressDiffMmHg / 0.75) * pressureCoeff;
            const sign = pressCorr >= 0 ? '+' : '';
            document.getElementById('pressCorr').textContent = sign + pressCorr.toFixed(2) + '°';
        }
        
        function animate() {
            if (animating) {
                const diff = targetPressure - currentPressure;
                if (Math.abs(diff) > 0.1) {
                    currentPressure += diff * 0.08;
                    updateDisplay();
                    requestAnimationFrame(animate);
                } else {
                    currentPressure = targetPressure;
                    updateDisplay();
                    animating = false;
                }
            }
        }
        
        function animatePressure() {
            targetPressure = PRESS_MIN + Math.random() * (PRESS_MAX - PRESS_MIN);
            animating = true;
            animate();
        }
        
        // Slider handlers
        document.getElementById('pressureSlider').addEventListener('input', function() {
            currentPressure = parseFloat(this.value);
            targetPressure = currentPressure;
            document.getElementById('pressureSpan').textContent = this.value;
            updateDisplay();
        });
        
        document.getElementById('refSlider').addEventListener('input', function() {
            adPressM = parseFloat(this.value);
            document.getElementById('refSpan').textContent = this.value;
            updateDisplay();
        });
        
        document.getElementById('coeffSlider').addEventListener('input', function() {
            pressureCoeff = parseFloat(this.value) / 1000;
            document.getElementById('coeffSpan').textContent = pressureCoeff.toFixed(3);
            updateDisplay();
        });
        
        // Initial draw
        updateDisplay();
    </script>
</body>
</html>
