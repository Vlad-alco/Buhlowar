<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a0a30"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#996515"/>
    </linearGradient>
    <linearGradient id="goldBr" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e8c840"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <filter id="shimmer">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg3)"/>

  <!-- Moon/full moon background -->
  <circle cx="50" cy="14" r="8" fill="#ddd8c8" opacity="0.1"/>
  <circle cx="52" cy="13" r="7.5" fill="url(#bg3)" opacity="0.8"/>

  <!-- Glow -->
  <ellipse cx="32" cy="52" rx="20" ry="12" fill="url(#glow3)"/>

  <!-- Burner ring -->
  <ellipse cx="32" cy="52" rx="14" ry="3" fill="#555" stroke="#777" stroke-width="0.5"/>

  <!-- Small flames -->
  <path d="M26,52 Q27,48 28,46 Q29,48 30,52 Z" fill="#ff6600" opacity="0.7"/>
  <path d="M30,52 Q31,47 32,45 Q33,47 34,52 Z" fill="#ff8800" opacity="0.8"/>
  <path d="M34,52 Q35,48 36,46 Q37,48 38,52 Z" fill="#ff6600" opacity="0.7"/>
  <path d="M31,52 Q32,48 32,46 Z" fill="#ffdd00" opacity="0.4"/>

  <!-- Copper pot (cauldron) -->
  <path d="M16,36 Q16,52 32,52 Q48,52 48,36 Z" fill="url(#gold)" stroke="#7a5510" stroke-width="0.8"/>
  <ellipse cx="32" cy="36" rx="16" ry="5" fill="url(#goldBr)" stroke="#7a5510" stroke-width="0.6"/>

  <!-- Liquid surface -->
  <ellipse cx="32" cy="38" rx="12" ry="3.5" fill="#ffaa00" opacity="0.25"/>

  <!-- Shine -->
  <ellipse cx="24" cy="40" rx="4" ry="8" fill="white" opacity="0.06"/>

  <!-- Tall ornate spout/neck -->
  <path d="M36,32 C38,22 42,16 44,12 C46,8 48,6 50,6" stroke="url(#gold)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Spiral decoration on neck -->
  <path d="M38,26 Q40,24 39,22 Q38,20 40,18" stroke="#ffd700" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Condenser coil -->
  <path d="M50,6 Q56,5 56,10 Q56,15 52,16 Q48,17 48,12 Q48,7 52,6" fill="url(#goldBr)" stroke="#7a5510" stroke-width="0.8"/>

  <!-- Drip spout -->
  <path d="M52,16 L56,22" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Golden drop -->
  <path d="M56,24 Q57.5,27 56,29 Q54.5,27 56,24 Z" fill="#ffd700" filter="url(#shimmer)"/>

  <!-- Decorative rivets on pot -->
  <circle cx="20" cy="44" r="1" fill="#ffee88" opacity="0.5"/>
  <circle cx="44" cy="44" r="1" fill="#ffee88" opacity="0.5"/>
  <circle cx="20" cy="48" r="1" fill="#ffee88" opacity="0.4"/>
  <circle cx="44" cy="48" r="1" fill="#ffee88" opacity="0.4"/>

  <!-- Rim decoration -->
  <ellipse cx="32" cy="36" rx="16" ry="5" fill="none" stroke="#ffd700" stroke-width="0.4" opacity="0.3"/>

  <!-- Stars -->
  <circle cx="8" cy="8" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="55" cy="32" r="0.6" fill="white" opacity="0.2"/>
  <circle cx="12" cy="22" r="0.5" fill="white" opacity="0.25"/>

  <!-- Steam -->
  <path d="M50,4 Q51,1 50,-2" stroke="white" stroke-width="0.7" fill="none" opacity="0.2"/>
</svg>
